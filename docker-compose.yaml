services:
    mysql:
        image: mysql:8.0
        container_name: mysql
        command: mysqld --default-authentication-plugin=mysql_native_password
        environment:
            MYSQL_ROOT_PASSWORD: "random_password"
        ports:
            - "3306:3306"

    ghost:
        image: ghost:latest
        restart: always
        ports:
            - 2368:2368
        environment:
            database__client: mysql
            database__connection__host: 192.168.1.25
            database__connection__user: root
            database__connection__password: random_password
            database__connection__database: ghost
            bulkEmail__mailgun__apiKey: 6e7fde2d-54e0-40d3-bfa3-4a5117219c20
            bulkEmail__mailgun__baseUrl: http://192.168.1.25:3000/v3
            bulkEmail__mailgun__domain: local.ontypetale.com
            hostSettings__managedEmail__sendingDomain: test.ontypetale.com
            mail__from: noreply@test.ontypetale.com
